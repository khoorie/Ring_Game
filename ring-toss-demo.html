<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Engagement Ring Toss</title>
  <style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Playfair+Display&display=swap");

[data-ring-toss-game],
[data-ring-toss-game] * {
  box-sizing: border-box;
}

[data-ring-toss-game] {
  --ert-ink: #341225;
  --ert-cream: #fff8ec;
  --ert-red: #bd2345;
  --ert-pink: #f8a8b8;
  --ert-gold: #f2bb4a;
  --ert-teal: #11626b;
  position: relative;
  width: min(100%, 480px);
  height: min(820px, calc(100dvh - 24px));
  min-height: 590px;
  margin: 0 auto;
  overflow: hidden;
  border: 1px solid rgba(52, 18, 37, .12);
  border-radius: 26px;
  background: var(--ert-cream);
  color: var(--ert-ink);
  font-family: Montserrat, Arial, sans-serif;
  box-shadow: 0 18px 50px rgba(52, 18, 37, .18);
  -webkit-user-select: none;
  user-select: none;
}

.ert-hud {
  height: 92px;
  padding: 15px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background:
    radial-gradient(circle at 15% -30%, rgba(255,255,255,.35), transparent 44%),
    linear-gradient(135deg, #9f1839, #d62e54);
  color: #fff;
  border-bottom: 4px solid var(--ert-gold);
}

.ert-brand {
  min-width: 0;
  line-height: 1.05;
}

.ert-brand-kicker {
  display: block;
  margin-bottom: 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  opacity: .8;
}

.ert-brand strong {
  display: block;
  max-width: 160px;
  font-family: Georgia, serif;
  font-size: clamp(18px, 5vw, 24px);
}

.ert-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(46px, 1fr));
  gap: 5px;
}

.ert-stats div {
  min-width: 48px;
  padding: 7px 5px 6px;
  text-align: center;
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 10px;
  background: rgba(69, 3, 27, .28);
}

.ert-stats span {
  display: block;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  opacity: .78;
}

.ert-stats strong {
  display: block;
  margin-top: 2px;
  font-size: 18px;
  font-variant-numeric: tabular-nums;
}

.ert-stage {
  position: relative;
  height: calc(100% - 136px);
  min-height: 450px;
  overflow: hidden;
  touch-action: none;
  background:
    radial-gradient(circle at 50% 7%, rgba(255, 236, 163, .85), transparent 22%),
    linear-gradient(#2c7185 0 23%, #135b6b 23% 25%, #0c4853 25% 100%);
}

.ert-lights {
  position: absolute;
  inset: 0 0 auto;
  height: 54px;
  background:
    radial-gradient(circle, #ffe69a 0 4px, transparent 5px) 5px 8px / 32px 28px repeat-x;
  filter: drop-shadow(0 0 7px rgba(255, 223, 125, .85));
  opacity: .9;
}

.ert-stage-title {
  position: absolute;
  z-index: 2;
  top: 38px;
  left: 50%;
  width: 84%;
  transform: translateX(-50%);
  text-align: center;
  color: #fff9d9;
  text-shadow: 0 2px 0 rgba(52,18,37,.35);
}

.ert-stage-title span,
.ert-stage-title strong {
  display: block;
  text-transform: uppercase;
}

.ert-stage-title span {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .22em;
}

.ert-stage-title strong {
  margin-top: 3px;
  font-family: Georgia, serif;
  font-size: clamp(17px, 5vw, 24px);
  letter-spacing: .04em;
}

.ert-board {
  position: absolute;
  z-index: 1;
  left: 4%;
  right: 4%;
  top: 15%;
  height: 58%;
  border: 4px solid #dcae50;
  border-radius: 28px 28px 16px 16px;
  transform: perspective(620px) rotateX(12deg);
  transform-origin: center bottom;
  background:
    radial-gradient(ellipse at center, rgba(255,255,255,.08), transparent 55%),
    repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 18px),
    linear-gradient(#1e7b77, #105a5e);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.14),
    0 20px 28px rgba(10,31,43,.32);
}

.ert-targets {
  position: absolute;
  z-index: 3;
  inset: 15% 4% 27%;
}

.ert-target {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: 52px;
  height: 112px;
  transform: translate(-50%, -50%) scale(var(--s));
  transform-origin: center bottom;
  filter: drop-shadow(0 9px 5px rgba(0,0,0,.2));
}

.ert-finger {
  position: absolute;
  z-index: 2;
  left: 50%;
  bottom: 13px;
  width: 34px;
  height: 90px;
  transform: translateX(-50%);
  border: 1px solid rgba(110,53,47,.27);
  border-radius: 18px 18px 11px 11px;
  background:
    linear-gradient(90deg, rgba(145,76,66,.18), transparent 20% 78%, rgba(145,76,66,.17)),
    linear-gradient(#f7c6aa, #e9a987);
  box-shadow: inset 0 2px 5px rgba(255,255,255,.5);
}

.ert-finger::before,
.ert-finger::after {
  content: "";
  position: absolute;
  left: 7px;
  right: 7px;
  height: 1px;
  background: rgba(123,65,59,.22);
  box-shadow: 0 4px 0 rgba(123,65,59,.15);
}

.ert-finger::before { top: 50px; }
.ert-finger::after { top: 66px; }

.ert-finger i {
  position: absolute;
  left: 6px;
  top: 6px;
  width: 20px;
  height: 26px;
  border-radius: 12px 12px 8px 8px;
  background: linear-gradient(#ffcad4, #e97891);
  box-shadow: inset 0 2px 3px rgba(255,255,255,.7);
}

.ert-base {
  position: absolute;
  z-index: 1;
  left: 50%;
  bottom: 4px;
  width: 50px;
  height: 18px;
  transform: translateX(-50%);
  border: 3px solid #d8a84d;
  border-radius: 50%;
  background: #0b4449;
}

.ert-value {
  position: absolute;
  z-index: 4;
  left: 50%;
  bottom: -10px;
  min-width: 30px;
  padding: 3px 5px;
  transform: translateX(-50%);
  border-radius: 10px;
  background: #fff5d0;
  color: #6d2740;
  text-align: center;
  font-size: 10px;
  font-weight: 800;
  box-shadow: 0 2px 6px rgba(0,0,0,.16);
}

.ert-target.is-hit .ert-finger {
  animation: ertTargetHit .42s ease both;
}

.ert-target.is-hit .ert-value {
  background: var(--ert-gold);
}

.ert-landed-ring {
  position: absolute;
  z-index: 5;
  left: 50%;
  top: 51px;
  width: 46px;
  height: 18px;
  transform: translateX(-50%);
  border: 5px solid #f8d36b;
  border-radius: 50%;
  box-shadow:
    inset 0 0 0 1px #b57913,
    0 2px 4px rgba(0,0,0,.3);
}

.ert-landed-ring::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -13px;
  width: 13px;
  height: 13px;
  transform: translateX(-50%) rotate(45deg);
  border: 2px solid #e3f9ff;
  background: linear-gradient(135deg, #fff, #9bd5e6);
  box-shadow: 0 0 8px rgba(255,255,255,.95);
}

.ert-launch-zone {
  position: absolute;
  z-index: 8;
  left: 0;
  right: 0;
  bottom: 0;
  height: 29%;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-direction: column;
  padding-bottom: 18px;
  background:
    linear-gradient(transparent, rgba(8,40,47,.48) 35%, rgba(7,31,39,.9));
}

.ert-swipe-copy {
  margin-bottom: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,.92);
  color: var(--ert-ink);
  font-size: 12px;
  font-weight: 700;
  box-shadow: 0 4px 15px rgba(0,0,0,.18);
  transition: opacity .2s ease;
}

.ert-launch-ring,
.ert-air-ring {
  width: 92px;
  height: 40px;
  border: 9px solid #f3c454;
  border-radius: 50%;
  background: transparent;
  box-shadow:
    inset 0 0 0 2px #a86d12,
    0 7px 12px rgba(0,0,0,.3),
    0 0 0 2px rgba(255,244,182,.35);
}

.ert-launch-ring {
  position: relative;
  display: block;
  padding: 0;
  appearance: none;
  cursor: grab;
  touch-action: none;
  transform-origin: center;
  transition: filter .2s ease, opacity .2s ease;
}

.ert-launch-ring:active {
  cursor: grabbing;
}

.ert-launch-ring:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 5px;
}

.ert-launch-ring[disabled] {
  opacity: 0;
  pointer-events: none;
}

.ert-diamond {
  position: absolute;
  left: 50%;
  top: -26px;
  width: 26px;
  height: 26px;
  transform: translateX(-50%) rotate(45deg);
  border: 3px solid #e7fbff;
  border-radius: 5px;
  background:
    linear-gradient(135deg, #fff 0 30%, #bce9f5 31% 61%, #fff 62%);
  box-shadow:
    0 0 13px rgba(255,255,255,.95),
    0 4px 8px rgba(0,0,0,.18);
}

.ert-diamond::after {
  content: "";
  position: absolute;
  inset: 5px;
  border: 1px solid rgba(83,143,161,.45);
}

.ert-air-ring {
  position: absolute;
  z-index: 10;
  left: 0;
  top: 0;
  display: none;
  margin: -20px 0 0 -46px;
  pointer-events: none;
  will-change: transform, opacity;
}

.ert-air-ring.is-flying {
  display: block;
}

.ert-aim-line {
  position: absolute;
  z-index: 7;
  left: 0;
  top: 0;
  display: none;
  width: 0;
  height: 3px;
  transform-origin: left center;
  border-radius: 999px;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.95) 0 9px, transparent 9px 16px);
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.3));
  pointer-events: none;
}

.ert-aim-line.is-visible {
  display: block;
}

.ert-feedback {
  position: absolute;
  z-index: 12;
  left: 50%;
  top: 23%;
  transform: translate(-50%, -50%) scale(.82);
  opacity: 0;
  color: #fff;
  text-align: center;
  font-family: Georgia, serif;
  font-size: clamp(28px, 9vw, 44px);
  font-weight: 800;
  white-space: nowrap;
  text-shadow:
    0 3px 0 #8f1735,
    0 7px 15px rgba(0,0,0,.3);
  pointer-events: none;
}

.ert-feedback.is-showing {
  animation: ertFeedback .82s ease both;
}

.ert-overlay {
  position: absolute;
  z-index: 30;
  inset: 0;
  display: none;
  place-items: center;
  padding: 24px;
  background: rgba(33, 10, 24, .72);
  backdrop-filter: blur(7px);
}

.ert-overlay.is-visible {
  display: grid;
}

.ert-card {
  width: min(100%, 330px);
  padding: 27px 24px 24px;
  border: 3px solid var(--ert-gold);
  border-radius: 24px;
  background:
    radial-gradient(circle at 50% 0, #fff, transparent 42%),
    var(--ert-cream);
  text-align: center;
  box-shadow: 0 20px 45px rgba(0,0,0,.3);
}

.ert-card-icon {
  display: block;
  margin-bottom: 8px;
  font-size: 46px;
}

.ert-card h2 {
  margin: 0 0 10px;
  font-family: Georgia, serif;
  font-size: 30px;
  color: var(--ert-red);
}

.ert-card p {
  margin: 0 0 18px;
  font-size: 14px;
  line-height: 1.5;
}

.ert-card button,
.ert-footer button {
  border: 0;
  border-radius: 999px;
  background: var(--ert-red);
  color: #fff;
  font: inherit;
  font-weight: 800;
  cursor: pointer;
}

.ert-card button {
  min-width: 160px;
  min-height: 48px;
  padding: 12px 20px;
  box-shadow: 0 5px 0 #7d1832;
}

.ert-card button:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #7d1832;
}

.ert-result-label {
  margin-bottom: 2px !important;
  text-transform: uppercase;
  letter-spacing: .13em;
  font-size: 11px !important;
  font-weight: 800;
}

.ert-final-score {
  display: block;
  margin-bottom: 9px;
  font-family: Georgia, serif;
  font-size: 64px;
  line-height: 1;
  color: var(--ert-red);
}

.ert-footer {
  height: 44px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff9ee;
  font-size: 12px;
}

.ert-footer button {
  padding: 7px 13px;
  background: var(--ert-ink);
  font-size: 11px;
}

@keyframes ertTargetHit {
  0%, 100% { transform: translateX(-50%) rotate(0); }
  35% { transform: translateX(-50%) rotate(-7deg); }
  65% { transform: translateX(-50%) rotate(6deg); }
}

@keyframes ertFeedback {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.65); }
  25%, 72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -65%) scale(1.12); }
}

@media (max-height: 680px) {
  [data-ring-toss-game] {
    min-height: 540px;
  }

  .ert-hud {
    height: 78px;
    padding-top: 10px;
    padding-bottom: 8px;
  }

  .ert-stage {
    height: calc(100% - 120px);
  }

  .ert-targets {
    bottom: 25%;
  }

  .ert-launch-zone {
    height: 27%;
    padding-bottom: 12px;
  }

  .ert-swipe-copy {
    margin-bottom: 8px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .ert-target.is-hit .ert-finger,
  .ert-feedback.is-showing {
    animation-duration: .01ms;
  }
}

/* --- separate toss ring and landed ring styles --- */

/* Toss / flying / intro ring: keep these as one CSS ring system. */
.ert-diamond {
  position: absolute;
  z-index: 3;
  left: 50%;
  top: -28px;
  width: 28px;
  height: 28px;
  transform: translateX(-50%);
  border: 3px solid #eefcff;
  border-radius: 50% !important;
  background:
    radial-gradient(circle at 35% 30%, #ffffff 0 18%, rgba(255,255,255,.9) 19% 30%, transparent 31%),
    radial-gradient(circle at 55% 55%, #ffffff 0 14%, #c7eff8 45%, #89c8dc 70%, #ffffff 100%);
  box-shadow:
    0 0 13px rgba(255,255,255,.95),
    0 4px 8px rgba(0,0,0,.18);
}

.ert-diamond::after {
  content: "";
  position: absolute;
  inset: 5px;
  border: 1px solid rgba(83,143,161,.35);
  border-radius: 50% !important;
}

/* Landed ring uses its own separate CSS ring system. */
.ert-landed-ring {
  position: absolute;
  left: 50%;
  top: 45px;
  width: 30px;
  height: 18px;
  transform: translateX(-50%);
  pointer-events: none;
}

.ert-landed-back,
.ert-landed-front {
  position: absolute;
  left: 50%;
  width: 30px;
  height: 12px;
  transform: translateX(-50%);
  border: 3px solid #d7a64a;
  border-radius: 999px;
  background: transparent;
}

.ert-landed-back {
  top: 4px;
  z-index: 1;
  opacity: .95;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.32),
    0 1px 2px rgba(0,0,0,.12);
}

.ert-landed-front {
  top: 7px;
  z-index: 3;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.42),
    0 2px 3px rgba(0,0,0,.18);
  clip-path: inset(52% 0 0 0);
}

.ert-landed-diamond {
  position: absolute;
  left: 50%;
  top: 0;
  width: 11px;
  height: 11px;
  transform: translateX(-50%);
  z-index: 4;
  border: 2px solid #e3f9ff;
  border-radius: 50% !important;
  background:
    radial-gradient(circle at 35% 30%, #ffffff 0 18%, rgba(255,255,255,.9) 19% 30%, transparent 31%),
    radial-gradient(circle at 55% 55%, #ffffff 0 14%, #c7eff8 45%, #89c8dc 70%, #ffffff 100%);
  box-shadow:
    0 0 7px rgba(255,255,255,.9),
    0 1px 2px rgba(0,0,0,.14);
}

.ert-target.is-hit .ert-finger {
  z-index: 2;
}


/* --- planned landed ring: single top-half band --- */

/* Landed ring only: sized from the 34px-wide finger. */
.ert-landed-ring {
  position: absolute;
  left: 50%;
  top: 46px;
  width: 38px;
  height: 18px;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 4;
}

.ert-landed-band {
  position: absolute;
  left: 50%;
  top: 5px;
  width: 38px;
  height: 14px;
  transform: translateX(-50%);
  border: 3px solid #d7a64a;
  border-radius: 50%;
  background: transparent;
  clip-path: inset(0 0 50% 0);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.4),
    0 1px 2px rgba(0,0,0,.18);
}

.ert-landed-diamond {
  position: absolute;
  left: 50%;
  top: -1px;
  z-index: 2;
  width: 12px;
  height: 12px;
  transform: translateX(-50%);
  border: 2px solid #e3f9ff;
  border-radius: 50% !important;
  background:
    radial-gradient(circle at 35% 30%, #fff 0 18%, rgba(255,255,255,.9) 19% 30%, transparent 31%),
    radial-gradient(circle at 55% 55%, #fff 0 14%, #c7eff8 45%, #89c8dc 70%, #fff 100%);
  box-shadow:
    0 0 7px rgba(255,255,255,.9),
    0 1px 2px rgba(0,0,0,.14);
}

/* Neutralize the previous landed-ring layers. */
.ert-landed-back,
.ert-landed-front {
  display: none !important;
}


/* --- landed ring behind-finger fix --- */

/* Remove every older landed-ring visual so only the new system renders. */
.ert-landed-ring {
  position: absolute;
  left: 50%;
  top: 46px;
  width: 40px;
  height: 18px;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 1;
  border: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  overflow: visible;
}

.ert-landed-ring::before,
.ert-landed-ring::after {
  content: none !important;
  display: none !important;
}

.ert-landed-back,
.ert-landed-front {
  display: none !important;
}

/* Full oval sits behind the finger. The finger masks the center,
   leaving the complete curved ends visible on both sides. */
.ert-landed-band {
  position: absolute;
  left: 50%;
  top: 4px;
  width: 40px;
  height: 14px;
  transform: translateX(-50%);
  border: 3px solid #d7a64a;
  border-radius: 50%;
  background: transparent;
  clip-path: none !important;
  z-index: 1;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.4),
    0 1px 2px rgba(0,0,0,.18);
}

/* Finger sits above the band and naturally hides the middle width. */
.ert-target.is-hit .ert-finger {
  z-index: 2;
}

/* Round diamond remains in front of the finger. */
.ert-landed-diamond {
  position: absolute;
  left: 50%;
  top: -1px;
  z-index: 4;
  width: 12px;
  height: 12px;
  transform: translateX(-50%);
  border: 2px solid #e3f9ff;
  border-radius: 50% !important;
  background:
    radial-gradient(circle at 35% 30%, #fff 0 18%, rgba(255,255,255,.9) 19% 30%, transparent 31%),
    radial-gradient(circle at 55% 55%, #fff 0 14%, #c7eff8 45%, #89c8dc 70%, #fff 100%);
  box-shadow:
    0 0 7px rgba(255,255,255,.9),
    0 1px 2px rgba(0,0,0,.14);
}


/* --- landed ring front-arc fix --- */

/* Full oval remains behind the finger, preserving the curved side ends. */
.ert-landed-ring {
  position: absolute;
  left: 50%;
  top: 46px;
  width: 40px;
  height: 18px;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 1;
  border: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  overflow: visible;
}

.ert-landed-ring::before,
.ert-landed-ring::after {
  content: none !important;
  display: none !important;
}

.ert-landed-band {
  position: absolute;
  left: 50%;
  top: 4px;
  width: 40px;
  height: 14px;
  transform: translateX(-50%);
  border: 3px solid #d7a64a;
  border-radius: 50%;
  background: transparent;
  clip-path: none !important;
  z-index: 1;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.4),
    0 1px 2px rgba(0,0,0,.18);
}

/* The finger covers the middle of the rear oval. */
.ert-target.is-hit .ert-finger {
  z-index: 2;
}

/* This front arc restores the visible band across the finger. */
.ert-landed-front-arc {
  position: absolute;
  left: 50%;
  top: 10px;
  width: 34px;
  height: 8px;
  transform: translateX(-50%);
  border-bottom: 3px solid #d7a64a;
  border-radius: 0 0 50% 50%;
  z-index: 3;
  box-shadow: 0 1px 2px rgba(0,0,0,.14);
}

.ert-landed-diamond {
  position: absolute;
  left: 50%;
  top: -1px;
  z-index: 4;
  width: 12px;
  height: 12px;
  transform: translateX(-50%);
  border: 2px solid #e3f9ff;
  border-radius: 50% !important;
  background:
    radial-gradient(circle at 35% 30%, #fff 0 18%, rgba(255,255,255,.9) 19% 30%, transparent 31%),
    radial-gradient(circle at 55% 55%, #fff 0 14%, #c7eff8 45%, #89c8dc 70%, #fff 100%);
  box-shadow:
    0 0 7px rgba(255,255,255,.9),
    0 1px 2px rgba(0,0,0,.14);
}


/* --- landed ring stacking correction --- */

/* Do not create a stacking context on the wrapper. This lets the rear band
   sit behind the finger while the front arc and diamond sit above it. */
.ert-landed-ring {
  position: absolute;
  left: 50%;
  top: 46px;
  width: 40px;
  height: 18px;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: auto !important;
  border: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  overflow: visible;
}

.ert-landed-ring::before,
.ert-landed-ring::after {
  content: none !important;
  display: none !important;
}

/* Rear oval: full curve and side returns, behind the finger. */
.ert-landed-band {
  position: absolute;
  left: 50%;
  top: 4px;
  width: 40px;
  height: 14px;
  transform: translateX(-50%);
  border: 3px solid #d7a64a;
  border-radius: 50%;
  background: transparent;
  clip-path: none !important;
  z-index: 1;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.4),
    0 1px 2px rgba(0,0,0,.18);
}

/* Finger is between the rear oval and the visible front arc. */
.ert-target.is-hit .ert-finger {
  z-index: 2;
}

/* Visible lower/front curve across the finger. */
.ert-landed-front-arc {
  position: absolute;
  left: 50%;
  top: 9px;
  width: 34px;
  height: 9px;
  transform: translateX(-50%);
  border: 0;
  border-bottom: 3px solid #d7a64a;
  border-radius: 0 0 50% 50%;
  z-index: 3;
  box-shadow: 0 1px 2px rgba(0,0,0,.14);
}

/* Landed stone is always round. */
.ert-landed-diamond {
  position: absolute;
  left: 50%;
  top: -1px;
  z-index: 4;
  width: 12px;
  height: 12px;
  transform: translateX(-50%);
  border: 2px solid #e3f9ff;
  border-radius: 50% !important;
  background:
    radial-gradient(circle at 35% 30%, #fff 0 18%, rgba(255,255,255,.9) 19% 30%, transparent 31%),
    radial-gradient(circle at 55% 55%, #fff 0 14%, #c7eff8 45%, #89c8dc 70%, #fff 100%);
  box-shadow:
    0 0 7px rgba(255,255,255,.9),
    0 1px 2px rgba(0,0,0,.14);
}


/* --- FINAL landed ring reset: single front band + round diamond --- */

/* Disable every older landed-ring visual. */
.ert-landed-ring,
.ert-landed-ring::before,
.ert-landed-ring::after,
.ert-landed-band,
.ert-landed-back,
.ert-landed-front {
  border: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  clip-path: none !important;
  mask: none !important;
}

.ert-landed-ring::before,
.ert-landed-ring::after,
.ert-landed-band,
.ert-landed-back,
.ert-landed-front {
  display: none !important;
}

.ert-landed-ring {
  position: absolute !important;
  left: 50% !important;
  top: 47px !important;
  width: 38px !important;
  height: 18px !important;
  transform: translateX(-50%) !important;
  z-index: 8 !important;
  overflow: visible !important;
  pointer-events: none !important;
}

/* The landed band is intentionally not an oval.
   It is one continuous top curve with both side returns and no bottom. */
.ert-landed-front-arc {
  display: block !important;
  position: absolute !important;
  left: 50% !important;
  top: 5px !important;
  width: 38px !important;
  height: 11px !important;
  transform: translateX(-50%) !important;
  z-index: 8 !important;
  border-top: 4px solid #d7a64a !important;
  border-left: 4px solid #d7a64a !important;
  border-right: 4px solid #d7a64a !important;
  border-bottom: 0 !important;
  border-radius: 50% 50% 0 0 !important;
  background: transparent !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.42),
    0 2px 3px rgba(0,0,0,.18) !important;
  clip-path: none !important;
}

/* Landed diamond: round only. */
.ert-landed-diamond {
  display: block !important;
  position: absolute !important;
  left: 50% !important;
  top: -1px !important;
  width: 12px !important;
  height: 12px !important;
  transform: translateX(-50%) !important;
  z-index: 9 !important;
  border: 2px solid #e3f9ff !important;
  border-radius: 50% !important;
  background:
    radial-gradient(circle at 35% 30%, #fff 0 18%, rgba(255,255,255,.9) 19% 30%, transparent 31%),
    radial-gradient(circle at 55% 55%, #fff 0 14%, #c7eff8 45%, #89c8dc 70%, #fff 100%) !important;
  box-shadow:
    0 0 7px rgba(255,255,255,.9),
    0 1px 2px rgba(0,0,0,.14) !important;
}

.ert-landed-diamond::before,
.ert-landed-diamond::after {
  border-radius: 50% !important;
  transform: none !important;
}


/* --- multiple skin tones --- */

/* Tone 2 is the original base finger color; tones 1 and 3-5 override it.
   Nail polish stays the same pink on every tone. */

.ert-target.ert-tone-1 .ert-finger {
  border-color: rgba(151,99,64,.3);
  background:
    linear-gradient(90deg, rgba(186,124,84,.16), transparent 20% 78%, rgba(186,124,84,.15)),
    linear-gradient(#fbdcc0, #f2ba92);
}

.ert-target.ert-tone-1 .ert-finger::before,
.ert-target.ert-tone-1 .ert-finger::after {
  background: rgba(168,109,73,.22);
  box-shadow: 0 4px 0 rgba(168,109,73,.15);
}

.ert-target.ert-tone-3 .ert-finger {
  border-color: rgba(112,60,29,.35);
  background:
    linear-gradient(90deg, rgba(126,70,34,.2), transparent 20% 78%, rgba(126,70,34,.18)),
    linear-gradient(#e6ac79, #cd8850);
  box-shadow: inset 0 2px 5px rgba(255,255,255,.38);
}

.ert-target.ert-tone-3 .ert-finger::before,
.ert-target.ert-tone-3 .ert-finger::after {
  background: rgba(110,58,26,.26);
  box-shadow: 0 4px 0 rgba(110,58,26,.17);
}

.ert-target.ert-tone-4 .ert-finger {
  border-color: rgba(66,34,15,.42);
  background:
    linear-gradient(90deg, rgba(72,38,17,.24), transparent 20% 78%, rgba(72,38,17,.22)),
    linear-gradient(#b1734a, #935630);
  box-shadow: inset 0 2px 5px rgba(255,255,255,.26);
}

.ert-target.ert-tone-4 .ert-finger::before,
.ert-target.ert-tone-4 .ert-finger::after {
  background: rgba(56,28,12,.3);
  box-shadow: 0 4px 0 rgba(56,28,12,.2);
}

.ert-target.ert-tone-5 .ert-finger {
  border-color: rgba(38,19,9,.5);
  background:
    linear-gradient(90deg, rgba(36,17,8,.28), transparent 20% 78%, rgba(36,17,8,.26)),
    linear-gradient(#7f4a2b, #5c331c);
  box-shadow: inset 0 2px 5px rgba(255,255,255,.2);
}

.ert-target.ert-tone-5 .ert-finger::before,
.ert-target.ert-tone-5 .ert-finger::after {
  background: rgba(26,12,5,.34);
  box-shadow: 0 4px 0 rgba(26,12,5,.22);
}


/* --- landed ring sits at the base of the finger --- */

.ert-landed-ring {
  top: 76px !important;
}


/* --- charcoal header, one-line Playfair title, cream board --- */

.ert-hud {
  background:
    radial-gradient(circle at 15% -30%, rgba(255,255,255,.16), transparent 44%),

}

.ert-stats div {

}

.ert-brand strong {

.ert-card h2 {

}

.ert-board {

    linear-gradient(#fff8ec, #f1e2c6);
}

.ert-base {
  background: #f6ead2;
}


/* --- title case, black start CTA, square corners, charcoal footer --- */

.ert-stats div {
  border-radius: 0;
}

.ert-card {
  border-radius: 0;
}

.ert-card h2 {
  color: #111;
}

.ert-card button {

  background: #000;

  font-family: Montserrat, Arial, sans-serif;
  text-transform: uppercase;

}

.ert-card button:active {
  box-shadow: 0 2px 0 #3a3a3a;
}

.ert-footer {
  background: #555659;
  color: #fff;
}

.ert-footer button {
  border-radius: 0;
  background: #fff;
  color: #000;
  font-family: Montserrat, Arial, sans-serif;
}


/* --- jewelry case: velvet back wall + wood interior, taller board --- */

/* No carnival lights inside a jewelry case. */
.ert-lights {
  display: none;
}

/* Top 22% is a velvet back wall with a soft sheen; below the dark case
   edge, warm wood with horizontal grain runs to the bottom. */
.ert-stage {
  background:
    radial-gradient(140% 70% at 50% 0%, rgba(255,232,190,.16), transparent 55%),
    repeating-linear-gradient(0deg, rgba(46,26,10,.14) 0 2px, transparent 2px 11px, rgba(46,26,10,.07) 11px 13px, transparent 13px 30px) 0 100% / 100% 76% no-repeat,
    linear-gradient(#55402b 0 21.5%, #2e1f10 21.5% 23%, #9a6d40 23% 24.5%, #8a613a 24.5% 100%);
}

.ert-board {
  top: 10%;
  height: 65%;
}

/* Launch-zone fade matches the wood instead of the old teal. */
.ert-launch-zone {
  background:
    linear-gradient(transparent, rgba(46,28,12,.5) 35%, rgba(30,18,8,.92));
}

.ert-value {
  border-radius: 0;
}

/* Landed ring raised off the point badge so the badge never covers it. */
.ert-landed-ring {
  top: 66px !important;
}


/* --- instruction pill raised higher above the launch ring --- */

.ert-swipe-copy {
  margin-bottom: 36px;
}


/* --- landed ring faces downward + ivory back wall --- */

/* The landed band is the bottom half of a full oval, so its curve faces
   down and matches the pedestal oval under the finger. The clip keeps the
   side tips where the band wraps out of view behind the finger. */
.ert-landed-front-arc {
  top: 2px !important;
  width: 38px !important;
  height: 15px !important;
  border: 4px solid #d7a64a !important;
  border-radius: 50% !important;
  clip-path: inset(44% 0 0 0) !important;
  box-shadow:
    inset 0 -1px 0 rgba(255,255,255,.42),
    0 2px 3px rgba(0,0,0,.18) !important;
}

/* Diamond sits centered on the front of the band. */
.ert-landed-diamond {
  top: 9px !important;
}

/* Back wall is ivory instead of brown; wood keeps the lower case. */
.ert-stage {
  background:
    radial-gradient(140% 70% at 50% 0%, rgba(255,255,255,.55), transparent 55%),
    repeating-linear-gradient(0deg, rgba(46,26,10,.14) 0 2px, transparent 2px 11px, rgba(46,26,10,.07) 11px 13px, transparent 13px 30px) 0 100% / 100% 76% no-repeat,
    linear-gradient(#fdf7ea 0 21.5%, #e6d9bc 21.5% 23%, #9a6d40 23% 24.5%, #8a613a 24.5% 100%);
}


/* --- feedback text: black Playfair, no red shadow --- */

.ert-feedback {
  color: #111;
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 400;
  text-shadow: none;
}


/* --- white halo behind feedback text for readability --- */

.ert-feedback {
  text-shadow:
    0 1px 2px #fff,
    0 -1px 2px #fff,
    0 0 8px #fff,
    0 0 18px rgba(255,255,255,.95),
    0 0 34px rgba(255,255,255,.8);
}


/* --- feedback in a gold-trimmed card instead of a halo --- */

.ert-feedback {
  text-shadow: none;
  padding: 10px 24px;
  background: #fffdf6;
  border: 3px solid var(--ert-gold);
  box-shadow: 0 10px 24px rgba(0,0,0,.2);
}


/* --- full-height layout under a 120px navbar, square outer frame --- */

[data-ring-toss-game] {
  height: calc(100vh - 120px);
  height: calc(100dvh - 120px);
  border-radius: 0;
}

    html, body { margin: 0; min-height: 100%; background: #f4e6dc; }
    body { padding: 0; }
  </style>
</head>
<body>
<div class="ert-game" data-ring-toss-game data-rings="10">
  <div class="ert-hud">
    <div class="ert-brand">
      <strong>Put a Ring on It!</strong>
    </div>

    <div class="ert-stats" aria-live="polite">
      <div><span>Score</span><strong data-ert-score>0</strong></div>
      <div><span>Rings</span><strong data-ert-rings>10</strong></div>
      <div><span>Streak</span><strong data-ert-streak>0</strong></div>
    </div>
  </div>

  <div class="ert-stage" data-ert-stage aria-label="Engagement ring toss game">
    <div class="ert-lights" aria-hidden="true"></div>
    <div class="ert-board" aria-hidden="true"></div>

    <div class="ert-targets">
      <div class="ert-target ert-tone-3" data-points="75" style="--x:35%;--y:8%;--s:.60">
        <span class="ert-value">75</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
      <div class="ert-target ert-tone-5" data-points="75" style="--x:65%;--y:8%;--s:.60">
        <span class="ert-value">75</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>

      <div class="ert-target ert-tone-1" data-points="50" style="--x:18%;--y:26%;--s:.70">
        <span class="ert-value">50</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
      <div class="ert-target ert-tone-4" data-points="50" style="--x:50%;--y:26%;--s:.70">
        <span class="ert-value">50</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
      <div class="ert-target ert-tone-2" data-points="50" style="--x:82%;--y:26%;--s:.70">
        <span class="ert-value">50</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>

      <div class="ert-target ert-tone-5" data-points="40" style="--x:30%;--y:44%;--s:.80">
        <span class="ert-value">40</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
      <div class="ert-target ert-tone-2" data-points="40" style="--x:70%;--y:44%;--s:.80">
        <span class="ert-value">40</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>

      <div class="ert-target ert-tone-4" data-points="30" style="--x:18%;--y:62%;--s:.90">
        <span class="ert-value">30</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
      <div class="ert-target ert-tone-1" data-points="30" style="--x:50%;--y:62%;--s:.90">
        <span class="ert-value">30</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
      <div class="ert-target ert-tone-3" data-points="30" style="--x:82%;--y:62%;--s:.90">
        <span class="ert-value">30</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>

      <div class="ert-target ert-tone-2" data-points="20" style="--x:35%;--y:80%;--s:1">
        <span class="ert-value">20</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
      <div class="ert-target ert-tone-5" data-points="20" style="--x:65%;--y:80%;--s:1">
        <span class="ert-value">20</span><span class="ert-finger"><i></i></span><span class="ert-base"></span>
      </div>
    </div>

    <div class="ert-aim-line" data-ert-aim aria-hidden="true"></div>

    <div class="ert-air-ring" data-ert-air-ring aria-hidden="true">
      <span class="ert-band-gloss" aria-hidden="true"></span>
      <span class="ert-diamond"></span>
    </div>

    <div class="ert-feedback" data-ert-feedback aria-live="polite"></div>

    <div class="ert-launch-zone">
      <div class="ert-swipe-copy" data-ert-instruction>
        Flick the ring in any direction
      </div>
      <button class="ert-launch-ring" data-ert-launch type="button" aria-label="Flick in any direction to toss the engagement ring">
        <span class="ert-band-gloss" aria-hidden="true"></span>
        <span class="ert-diamond"></span>
      </button>
    </div>

    <div class="ert-overlay is-visible" data-ert-intro>
      <div class="ert-card">
        <span class="ert-card-icon ert-card-ring" aria-hidden="true"><span class="ert-band-gloss" aria-hidden="true"></span><span class="ert-diamond"></span></span>
        <h2>Test Your Luck</h2>
        <p>Flick the ring onto a finger — any direction works. Smaller, farther fingers score more points.</p>
        <button type="button" data-ert-start>Start game</button>
      </div>

      <div class="ert-card">
        <span class="ert-card-icon" aria-hidden="true">✨</span>

        <strong class="ert-final-score" data-ert-final-score>0</strong>

  <div class="ert-footer">

    <button type="button" data-ert-reset>Restart</button>
  </div>
</div>
<script>
(function () {
  "use strict";

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function initRingToss(root) {
    if (!root || root.dataset.ertReady === "true") return;
    root.dataset.ertReady = "true";

    var stage = root.querySelector("[data-ert-stage]");
    var launchRing = root.querySelector("[data-ert-launch]");
    var airRing = root.querySelector("[data-ert-air-ring]");
    var aimLine = root.querySelector("[data-ert-aim]");
    var feedback = root.querySelector("[data-ert-feedback]");
    var instruction = root.querySelector("[data-ert-instruction]");
    var intro = root.querySelector("[data-ert-intro]");
    var results = root.querySelector("[data-ert-results]");
    var startButton = root.querySelector("[data-ert-start]");
    var playAgainButton = root.querySelector("[data-ert-play-again]");
    var resetButton = root.querySelector("[data-ert-reset]");
    var scoreEl = root.querySelector("[data-ert-score]");
    var ringsEl = root.querySelector("[data-ert-rings]");
    var streakEl = root.querySelector("[data-ert-streak]");
    var bestEl = root.querySelector("[data-ert-best]");
    var finalScoreEl = root.querySelector("[data-ert-final-score]");
    var bestCopyEl = root.querySelector("[data-ert-best-copy]");
    var targets = Array.prototype.slice.call(root.querySelectorAll(".ert-target"));

    if (!stage || !launchRing || !airRing || !aimLine) return;

    var totalRings = parseInt(root.getAttribute("data-rings"), 10) || 10;
    var score = 0;
    var ringsLeft = totalRings;
    var streak = 0;
    var isDragging = false;
    var isFlying = false;
    var gameStarted = false;
    var startPoint = null;
    var pointerId = null;
    var swipeSamples = [];
    var bestStorageKey = "engagementRingTossBest";
    var best = 0;
    var audioContext = null;

    try {
      best = parseInt(window.localStorage.getItem(bestStorageKey), 10) || 0;
    } catch (error) {
      best = 0;
    }

    function updateHud() {
      scoreEl.textContent = String(score);
      ringsEl.textContent = String(ringsLeft);
      streakEl.textContent = String(streak);
      bestEl.textContent = String(best);
    }

    function setInstruction(message) {
      instruction.textContent = message;
    }

    function playTone(hit) {
      try {
        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        var oscillator = audioContext.createOscillator();
        var gain = audioContext.createGain();
        oscillator.type = hit ? "sine" : "triangle";
        oscillator.frequency.setValueAtTime(hit ? 620 : 170, audioContext.currentTime);
        if (hit) {
          oscillator.frequency.exponentialRampToValueAtTime(920, audioContext.currentTime + 0.12);
        }
        gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.12, audioContext.currentTime + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.18);
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.2);
      } catch (error) {
        // Sound is optional.
      }
    }

    function showFeedback(message) {
      feedback.textContent = message;
      feedback.classList.remove("is-showing");
      void feedback.offsetWidth;
      feedback.classList.add("is-showing");
    }

    function getLaunchCenter() {
      var stageRect = stage.getBoundingClientRect();
      var ringRect = launchRing.getBoundingClientRect();
      return {
        x: ringRect.left + ringRect.width / 2 - stageRect.left,
        y: ringRect.top + ringRect.height / 2 - stageRect.top
      };
    }

    function resetLaunchRing() {
      launchRing.style.transform = "";
      launchRing.disabled = false;
      aimLine.classList.remove("is-visible");
      airRing.classList.remove("is-flying");
      airRing.style.opacity = "";
      airRing.style.transform = "";
      isDragging = false;
      isFlying = false;
      pointerId = null;
      swipeSamples = [];
    }

    function resetGame(showIntro) {
      score = 0;
      ringsLeft = totalRings;
      streak = 0;
      gameStarted = !showIntro;
      targets.forEach(function (target) {
        target.classList.remove("is-hit");
        target.removeAttribute("data-hit");
        var landedRing = target.querySelector(".ert-landed-ring");
        if (landedRing) landedRing.remove();
      });
      results.classList.remove("is-visible");
      intro.classList.toggle("is-visible", !!showIntro);
      setInstruction("Flick the ring in any direction");
      resetLaunchRing();
      updateHud();
    }

    function startGame() {
      gameStarted = true;
      intro.classList.remove("is-visible");
      results.classList.remove("is-visible");
      setInstruction("Flick the ring in any direction");
      updateHud();
      launchRing.focus({ preventScroll: true });
    }

    function finishGame() {
      gameStarted = false;
      if (score > best) {
        best = score;
        try {
          window.localStorage.setItem(bestStorageKey, String(best));
        } catch (error) {
          // Local storage is optional.
        }
      }
      updateHud();
      finalScoreEl.textContent = String(score);
      bestCopyEl.textContent = score === best && score > 0
        ? "New best score!"
        : "Your best: " + best;
      results.classList.add("is-visible");

      root.dispatchEvent(new CustomEvent("ring-toss-complete", {
        bubbles: true,
        detail: {
          score: score,
          best: best,
          ringsUsed: totalRings
        }
      }));
    }

    function findTarget(x, y) {
      var stageRect = stage.getBoundingClientRect();
      var nearest = null;
      var nearestDistance = Infinity;

      targets.forEach(function (target) {
        if (target.getAttribute("data-hit") === "true") return;

        var finger = target.querySelector(".ert-finger");
        var rect = finger.getBoundingClientRect();
        var targetX = rect.left + rect.width / 2 - stageRect.left;
        var targetY = rect.top + rect.height * 0.63 - stageRect.top;
        var distance = Math.hypot(x - targetX, y - targetY);
        var hitRadius = Math.max(25, rect.width * 0.9);

        if (distance <= hitRadius && distance < nearestDistance) {
          nearest = target;
          nearestDistance = distance;
        }
      });

      return nearest;
    }

    function landOnTarget(target) {
      var basePoints = parseInt(target.getAttribute("data-points"), 10) || 10;
      streak += 1;
      var streakBonus = Math.max(0, streak - 1) * 5;
      var earned = basePoints + streakBonus;

      score += earned;
      target.setAttribute("data-hit", "true");
      target.classList.add("is-hit");

      var landedRing = document.createElement("span");
      landedRing.className = "ert-landed-ring";
      landedRing.setAttribute("aria-hidden", "true");
      landedRing.innerHTML =
        '<span class="ert-landed-front-arc" aria-hidden="true"></span>' +
        '<span class="ert-landed-diamond" aria-hidden="true"></span>';
      target.appendChild(landedRing);

      showFeedback("She Said Yes!");
      setInstruction("+" + earned + (streak > 1 ? " — " + streak + " in a row!" : " points!"));
      playTone(true);
      if (navigator.vibrate) navigator.vibrate(28);
    }

    function missTarget() {
      streak = 0;
      showFeedback("She Said No…");
      setInstruction("Flick toward the middle of a finger");
      playTone(false);
    }

    function completeToss(endX, endY) {
      var target = findTarget(endX, endY);
      if (target) {
        landOnTarget(target);
      } else {
        missTarget();
      }

      ringsLeft -= 1;
      updateHud();

      window.setTimeout(function () {
        resetLaunchRing();
        if (ringsLeft <= 0 || targets.every(function (targetItem) {
          return targetItem.getAttribute("data-hit") === "true";
        })) {
          finishGame();
        }
      }, 480);
    }

    function animateToss(from, to, duration) {
      isFlying = true;
      launchRing.disabled = true;
      launchRing.style.transform = "";
      aimLine.classList.remove("is-visible");
      airRing.classList.add("is-flying");

      var startTime = performance.now();
      var control = {
        x: (from.x + to.x) / 2,
        y: Math.min(from.y, to.y) - stage.clientHeight * 0.23
      };

      function frame(now) {
        var t = clamp((now - startTime) / duration, 0, 1);
        var eased = 1 - Math.pow(1 - t, 2);
        var inverse = 1 - eased;
        var x = inverse * inverse * from.x + 2 * inverse * eased * control.x + eased * eased * to.x;
        var y = inverse * inverse * from.y + 2 * inverse * eased * control.y + eased * eased * to.y;
        var depthScale = 1 - ((from.y - y) / stage.clientHeight) * 0.52;
        var scale = clamp(depthScale, 0.5, 1.08);
        var rotation = eased * 420;

        airRing.style.transform =
          "translate3d(" + x + "px," + y + "px,0) " +
          "scale(" + scale + ") rotate(" + rotation + "deg)";
        airRing.style.opacity = String(clamp(1 - Math.max(0, eased - 0.9) * 4, 0.15, 1));

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          completeToss(to.x, to.y);
        }
      }

      requestAnimationFrame(frame);
    }

    function onPointerDown(event) {
      if (!gameStarted || isFlying || ringsLeft <= 0) return;

      var stageRect = stage.getBoundingClientRect();
      isDragging = true;
      pointerId = event.pointerId;
      startPoint = getLaunchCenter();
      swipeSamples = [{
        x: event.clientX - stageRect.left,
        y: event.clientY - stageRect.top,
        t: event.timeStamp
      }];
      try {
        stage.setPointerCapture(pointerId);
      } catch (error) {
        // Pointer capture is optional.
      }
      setInstruction("Flick toward a finger");
      event.preventDefault();
    }

    function onPointerMove(event) {
      if (!isDragging || event.pointerId !== pointerId) return;

      var stageRect = stage.getBoundingClientRect();
      var current = {
        x: event.clientX - stageRect.left,
        y: event.clientY - stageRect.top,
        t: event.timeStamp
      };
      swipeSamples.push(current);
      while (swipeSamples.length > 2 && current.t - swipeSamples[0].t > 160) {
        swipeSamples.shift();
      }

      var first = swipeSamples[0];
      var dx = current.x - first.x;
      var dy = current.y - first.y;
      var distance = Math.hypot(dx, dy);
      var angle = Math.atan2(dy, dx) * 180 / Math.PI;

      launchRing.style.transform =
        "translate3d(" + clamp(dx * 0.22, -42, 42) + "px," +
        clamp(dy * 0.16, -36, 36) + "px,0) rotate(" +
        clamp(dx * 0.12, -14, 14) + "deg)";

      aimLine.style.left = startPoint.x + "px";
      aimLine.style.top = startPoint.y + "px";
      aimLine.style.width = Math.min(distance * 1.6, stage.clientHeight * 0.38) + "px";
      aimLine.style.transform = "rotate(" + angle + "deg)";
      aimLine.classList.toggle("is-visible", distance > 14);
      event.preventDefault();
    }

    function onPointerUp(event) {
      if (!isDragging || event.pointerId !== pointerId) return;

      isDragging = false;
      try {
        stage.releasePointerCapture(pointerId);
      } catch (error) {
        // Pointer may already be released.
      }

      var stageRect = stage.getBoundingClientRect();
      var release = {
        x: event.clientX - stageRect.left,
        y: event.clientY - stageRect.top,
        t: event.timeStamp
      };
      var first = swipeSamples[0] || release;
      var dx = release.x - first.x;
      var dy = release.y - first.y;
      var swipeDistance = Math.hypot(dx, dy);
      var elapsed = Math.max(release.t - first.t, 16);
      var speed = swipeDistance / elapsed;

      if (swipeDistance < 24 || speed < 0.25) {
        setInstruction("Flick faster to toss the ring");
        resetLaunchRing();
        return;
      }

      var throwDistance = clamp(speed * 340, stage.clientHeight * 0.3, stage.clientHeight * 1.05);
      var endX = clamp(startPoint.x + (dx / swipeDistance) * throwDistance, 26, stage.clientWidth - 26);
      var endY = clamp(startPoint.y + (dy / swipeDistance) * throwDistance, stage.clientHeight * 0.1, stage.clientHeight * 0.92);
      var duration = clamp(430 + throwDistance * 0.55, 560, 820);

      animateToss(startPoint, { x: endX, y: endY }, duration);
      event.preventDefault();
    }

    function onPointerCancel() {
      if (isDragging) resetLaunchRing();
    }

    startButton.addEventListener("click", startGame);
    playAgainButton.addEventListener("click", function () {
      resetGame(false);
      startGame();
    });
    resetButton.addEventListener("click", function () {
      resetGame(false);
      startGame();
    });

    stage.addEventListener("pointerdown", onPointerDown);
    stage.addEventListener("pointermove", onPointerMove);
    stage.addEventListener("pointerup", onPointerUp);
    stage.addEventListener("pointercancel", onPointerCancel);

    updateHud();
  }

  function initAllRingTossGames() {
    document.querySelectorAll("[data-ring-toss-game]").forEach(initRingToss);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initAllRingTossGames);
  } else {
    initAllRingTossGames();
  }

  if (!window.__ertMutationObserver) {
    window.__ertMutationObserver = new MutationObserver(initAllRingTossGames);
    window.__ertMutationObserver.observe(document.documentElement, {
      childList: true,
      subtree: true
    });
  }
})();
</script>
</body>
</html>
